<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎰 SLOTS - Casino Royale</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #0a001f, #1a0033);
      color: white;
      font-family: 'Press Start 2P', monospace;
      text-align: center;
      min-height: 100vh;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2.8em;
      color: #ffff00;
      text-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff;
      margin: 0;
    }

    .balance {
      background: rgba(0,0,0,0.8);
      padding: 12px 25px;
      border: 3px solid #ffff00;
      border-radius: 12px;
      font-size: 1.3em;
      color: #ffff00;
    }

    .game-area {
      background: rgba(0, 0, 0, 0.85);
      border: 5px solid #00ffff;
      border-radius: 20px;
      padding: 30px;
      max-width: 600px;
      margin: 30px auto;
      box-shadow: 0 0 50px #ff00ff;
    }

    #slots {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 30px 0;
      font-size: 6em;
      background: #000;
      padding: 30px 20px;
      border: 6px solid #ffff00;
      border-radius: 15px;
      box-shadow: inset 0 0 30px rgba(255,255,0,0.3);
    }

    .reel {
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      border: 4px solid #00ffff;
      border-radius: 12px;
    }

    input, button {
      font-family: 'Press Start 2P', monospace;
      padding: 15px 25px;
      margin: 15px;
      font-size: 1.1em;
      border-radius: 10px;
    }

    input {
      background: #111;
      color: white;
      border: 3px solid #00ffff;
      width: 220px;
    }

    button {
      background: #ff00ff;
      color: white;
      cursor: pointer;
      box-shadow: 0 0 25px #ff00ff;
      transition: all 0.3s;
    }

    button:hover {
      background: #ffff00;
      color: black;
      transform: scale(1.08);
      box-shadow: 0 0 40px #ffff00;
    }

    #result {
      margin: 25px auto;
      padding: 20px;
      font-size: 1.5em;
      min-height: 80px;
      border-radius: 12px;
      background: rgba(0,0,0,0.7);
    }

    .win { color: #00ff88; text-shadow: 0 0 20px #00ff88; }
    .lose { color: #ff3366; text-shadow: 0 0 20px #ff3366; }
    .jackpot { 
      color: #ffff00; 
      animation: jackpotPulse 0.8s infinite; 
    }

    .back-btn {
      background: #333;
      color: white;
      padding: 12px 30px;
      font-size: 1em;
      margin-top: 30px;
    }

    @keyframes jackpotPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }
    @media (max-width: 768px) {

  body {
    overflow-x: hidden;
  }

  h1 {
    font-size: 1.6em !important;
  }

  .subtitle {
    font-size: 0.8em !important;
  }

  .games-grid {
    grid-template-columns: 1fr !important;
    gap: 15px;
  }

  .game-card {
    padding: 20px 15px;
  }

  button {
    width: 100%;
    font-size: 0.9em;
  }

  .balance {
    position: static;
    margin: 10px auto;
    width: fit-content;
  }
}
  </style>
</head>
<body>

  <div class="header">
    <button class="back-btn" onclick="window.location.href='main.html'">← BACK TO LOBBY</button>
    <h1>🎰 SLOTS</h1>
    <div class="balance" id="balance">Balance: ₦1,000,000</div>
  </div>

  <div class="game-area">
    <h2>SPIN TO WIN BIG!</h2>
    
    <div id="slots">
      <div class="reel" id="reel1">🍒</div>
      <div class="reel" id="reel2">⭐</div>
      <div class="reel" id="reel3">7️⃣</div>
    </div>

    <input id="slotBet" type="number" placeholder="Enter Bet Amount" value="5000">
    <br>
    <button onclick="playSlots()">SPIN THE REELS</button>
  </div>

  <div id="result"></div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
// Sound Effects
const sounds = {
  spin:    "https://assets.mixkit.co/sfx/preview/2578/2578.wav",   // Reel spinning
  win:     "https://assets.mixkit.co/sfx/preview/2019/2019.wav",   // Normal win
  bigwin:  "https://assets.mixkit.co/sfx/preview/2018/2018.wav",   // Jackpot
  lose:    "https://assets.mixkit.co/sfx/preview/2572/2572.wav",   // Loss
  click:   "https://assets.mixkit.co/sfx/preview/2568/2568.wav"    // Button click
};

let soundEnabled = true;

function playSound(type) {
  if (!soundEnabled || !sounds[type]) return;
  
  const audio = new Audio(sounds[type]);
  audio.volume = 0.65;           // Nice balanced volume
  audio.play().catch(() => {});  // Prevent autoplay blocking errors
}

// Toggle sound (you can call this from settings later)
function toggleSound() {
  soundEnabled = !soundEnabled;
  alert("Sound is now " + (soundEnabled ? "ON" : "OFF"));
}

// Main Game Logic
let money = 1000000;
const symbols = ["🍒", "🛎️", "⭐", "💎", "7️⃣", "🍋", "🍉", "🔥", "💰"];

function updateBalance() {
  const bal = document.getElementById("balance");
  bal.innerText = `Balance: ₦${money.toLocaleString()}`;
  localStorage.setItem("casinoMoney", money);
}

function showResult(text, className) {
  const res = document.getElementById("result");
  res.innerHTML = text;
  res.className = className || "";
}

async function playSlots() {
  let bet = parseInt(document.getElementById("slotBet").value) || 0;

  if (bet <= 0 || bet > money) {
    alert("Please enter a valid bet amount!");
    return;
  }

  // Play button click sound
  playSound('click');

  money -= bet;
  updateBalance();

  const reel1 = document.getElementById("reel1");
  const reel2 = document.getElementById("reel2");
  const reel3 = document.getElementById("reel3");

  // Start spinning sound
  playSound('spin');

  // Spinning animation
  for (let i = 0; i < 35; i++) {
    reel1.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    reel2.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    reel3.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    await new Promise(r => setTimeout(r, 45));
  }

  // Final result
  const s1 = symbols[Math.floor(Math.random() * symbols.length)];
  const s2 = symbols[Math.floor(Math.random() * symbols.length)];
  const s3 = symbols[Math.floor(Math.random() * symbols.length)];

  reel1.textContent = s1;
  reel2.textContent = s2;
  reel3.textContent = s3;

  let resultText = `🎰 [ ${s1} | ${s2} | ${s3} ] 🎰<br>`;

  if (s1 === s2 && s2 === s3) {
    let win = bet * 25;
    money += win;
    resultText += `🎉 MEGA JACKPOT!!! +₦${win.toLocaleString()}`;
    showResult(resultText, "jackpot");
    playSound('bigwin');           // Big jackpot sound
    confetti({ particleCount: 450, spread: 100 });
  } 
  else if (s1 === s2 || s2 === s3 || s1 === s3) {
    let win = bet * 8;
    money += win;
    resultText += `✅ BIG WIN! +₦${win.toLocaleString()}`;
    showResult(resultText, "win");
    playSound('win');              // Normal win sound
  } 
  else {
    resultText += "💸 Better luck next time";
    showResult(resultText, "lose");
    playSound('lose');             // Loss sound
  }

  updateBalance();
}

// Load saved balance when page opens
if (localStorage.getItem("casinoMoney")) {
  money = parseInt(localStorage.getItem("casinoMoney"));
}
updateBalance();
</script>
</body>
</html>
