<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎡 ROULETTE - Casino Royale</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #0a001f, #1a0033);
      color: white;
      font-family: 'Press Start 2P', monospace;
      text-align: center;
      min-height: 100vh;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2.8em;
      color: #ffff00;
      text-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff;
      margin: 0;
    }

    .balance {
      background: rgba(0,0,0,0.8);
      padding: 12px 25px;
      border: 3px solid #ffff00;
      border-radius: 12px;
      font-size: 1.3em;
      color: #ffff00;
    }

    .game-area {
      background: rgba(0, 0, 0, 0.85);
      border: 5px solid #00ffff;
      border-radius: 20px;
      padding: 30px;
      max-width: 620px;
      margin: 30px auto;
      box-shadow: 0 0 50px #ff00ff;
    }

    #roulette-container {
      position: relative;
      width: 260px;
      height: 260px;
      margin: 30px auto;
    }

    #roulette-wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: conic-gradient(
        #ff0033 0deg 18deg,
        #111 18deg 36deg,
        #ff0033 36deg 54deg,
        #111 54deg 72deg,
        #ff0033 72deg 90deg,
        #111 90deg 108deg,
        #ff0033 108deg 126deg,
        #111 126deg 144deg,
        #ff0033 144deg 162deg,
        #111 162deg 180deg,
        #00aa00 180deg 190deg,   /* Green 0 */
        #111 190deg 200deg,
        #ff0033 200deg 218deg,
        #111 218deg 236deg,
        #ff0033 236deg 254deg,
        #111 254deg 272deg,
        #ff0033 272deg 290deg,
        #111 290deg 308deg,
        #ff0033 308deg 326deg,
        #111 326deg 344deg,
        #ff0033 344deg 360deg
      );
      border: 18px solid #111;
      box-shadow: 0 0 50px #ff0033;
      transition: transform 4.5s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    #roulette-ball {
      position: absolute;
      top: 18px;
      left: 50%;
      width: 26px;
      height: 26px;
      background: #ffff00;
      border-radius: 50%;
      box-shadow: 0 0 25px #ffff00;
      transform: translateX(-50%);
    }

    .controls {
      margin: 30px 0;
    }

    select, input, button {
      font-family: 'Press Start 2P', monospace;
      padding: 14px 20px;
      margin: 10px;
      font-size: 1.1em;
      border-radius: 10px;
    }

    select, input {
      background: #111;
      color: white;
      border: 3px solid #00ffff;
    }

    button {
      background: #ff00ff;
      color: white;
      cursor: pointer;
      box-shadow: 0 0 25px #ff00ff;
      transition: all 0.3s;
    }

    button:hover {
      background: #ffff00;
      color: black;
      transform: scale(1.08);
      box-shadow: 0 0 40px #ffff00;
    }

    #result {
      margin: 30px auto;
      padding: 25px;
      font-size: 1.5em;
      min-height: 90px;
      border-radius: 15px;
      background: rgba(0,0,0,0.7);
    }

    .win { color: #00ff88; text-shadow: 0 0 25px #00ff88; }
    .lose { color: #ff3366; text-shadow: 0 0 25px #ff3366; }

    .back-btn {
      background: #333;
      color: white;
      padding: 12px 30px;
      font-size: 1em;
    }
  </style>
</head>
<body>

  <div class="header">
    <button class="back-btn" onclick="window.location.href='main.html'">← BACK TO LOBBY</button>
    <h1>🎡 ROULETTE</h1>
    <div class="balance" id="balance">Balance: ₦1,000,000</div>
  </div>

  <div class="game-area">
    <h2>RED OR BLACK?</h2>
    
    <div id="roulette-container">
      <div id="roulette-wheel">
        <div id="roulette-ball"></div>
      </div>
    </div>

    <div class="controls">
      <select id="rouletteChoice">
        <option value="">— Choose Color —</option>
        <option value="red">🔴 RED</option>
        <option value="black">⚫ BLACK</option>
      </select>
      
      <input id="rouletteBet" type="number" placeholder="Bet Amount" value="10000">
    </div>

    <button onclick="playRoulette()">SPIN THE WHEEL</button>
  </div>

  <div id="result"></div>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
// ==================== SOUND SYSTEM ====================
const sounds = {
  roulette: "https://assets.mixkit.co/sfx/preview/2570/2570.wav",   // Wheel spinning sound
  win:      "https://assets.mixkit.co/sfx/preview/2019/2019.wav",   // Win sound
  lose:     "https://assets.mixkit.co/sfx/preview/2572/2572.wav",   // Loss sound
  click:    "https://assets.mixkit.co/sfx/preview/2568/2568.wav"    // Button click
};

let soundEnabled = true;

function playSound(type) {
  if (!soundEnabled || !sounds[type]) return;
  
  const audio = new Audio(sounds[type]);
  audio.volume = 0.65;
  audio.play().catch(() => {});
}

// ==================== GAME LOGIC ====================
let money = 1000000;

function updateBalance() {
  document.getElementById("balance").innerText = `Balance: ₦${money.toLocaleString()}`;
  localStorage.setItem("casinoMoney", money);
}

function showResult(text, className) {
  const res = document.getElementById("result");
  res.innerHTML = text;
  res.className = className || "";
}

async function playRoulette() {
  const choice = document.getElementById("rouletteChoice").value;
  let bet = parseInt(document.getElementById("rouletteBet").value) || 0;

  if (!choice) {
    alert("Please select Red or Black!");
    return;
  }
  if (bet <= 0 || bet > money) {
    alert("Please enter a valid bet amount!");
    return;
  }

  // Button click sound
  playSound('click');

  money -= bet;
  updateBalance();

  const wheel = document.getElementById("roulette-wheel");
  const degrees = 2200 + Math.random() * 2200;

  // Play roulette wheel spin sound
  playSound('roulette');

  wheel.style.transition = "transform 4.5s cubic-bezier(0.25, 0.1, 0.25, 1)";
  wheel.style.transform = `rotate(${degrees}deg)`;

  await new Promise(r => setTimeout(r, 4600));

  // Reset wheel for next spin
  wheel.style.transition = "none";
  wheel.style.transform = `rotate(${degrees % 360}deg)`;

  // Determine result
  let roll = Math.floor(Math.random() * 37); // 0 to 36
  let landedColor = (roll === 0) ? "green" : (roll % 2 === 1 ? "red" : "black");

  let resultText = `Ball landed on <strong>${roll}</strong> (${landedColor.toUpperCase()})<br>`;

  if (choice === landedColor) {
    let winnings = bet * 2;
    money += winnings;
    resultText += `🎉 YOU WIN ₦${winnings.toLocaleString()}!`;
    showResult(resultText, "win");
    playSound('win');                    // Win sound
    confetti({ particleCount: 220, spread: 80 });
  } else {
    resultText += "💸 House wins this round";
    showResult(resultText, "lose");
    playSound('lose');                   // Loss sound
  }

  updateBalance();
}

// Load saved balance when page opens
if (localStorage.getItem("casinoMoney")) {
  money = parseInt(localStorage.getItem("casinoMoney"));
}
updateBalance();
</script>
</body>
</html>
