<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CASINO ROYALE • Abuja</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #0a001f 0%, #1a0033 50%, #000 100%);
      color: white;
      font-family: 'Press Start 2P', monospace;
      text-align: center;
      min-height: 100vh;
      overflow-y: auto;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 3.8em;
      margin: 30px 0 10px;
      text-shadow: 
        0 0 20px #ff00ff,
        0 0 40px #00ffff,
        0 0 60px #ffff00;
      animation: glow 2s infinite alternate;
    }

    .subtitle {
      font-size: 1.4em;
      color: #ffff00;
      margin-bottom: 60px;
      text-shadow: 0 0 15px #ffff00;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      margin-top: 50px;
    }

    .game-card {
      background: rgba(0, 0, 0, 0.85);
      border: 4px solid #00ffff;
      border-radius: 20px;
      padding: 30px 20px;
      transition: all 0.4s ease;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
    }

    .game-card:hover {
      transform: translateY(-15px) scale(1.05);
      border-color: #ffff00;
      box-shadow: 0 0 50px rgba(255, 255, 0, 0.6);
    }

    .game-card h2 {
      color: #ff00ff;
      font-size: 1.8em;
      margin: 15px 0;
      text-shadow: 0 0 15px #ff00ff;
    }

    .emoji {
      font-size: 4.5em;
      margin: 15px 0;
    }

    button {
      background: linear-gradient(#ff00ff, #aa00aa);
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 1.1em;
      margin-top: 20px;
      cursor: pointer;
      border-radius: 10px;
      box-shadow: 0 0 20px #ff00ff;
      transition: all 0.3s;
    }

    button:hover {
      background: linear-gradient(#ffff00, #ffaa00);
      color: black;
      transform: scale(1.1);
      box-shadow: 0 0 35px #ffff00;
    }

    .balance {
      position: absolute;
      top: 20px;
      right: 30px;
      background: rgba(0,0,0,0.7);
      padding: 10px 25px;
      border: 2px solid #ffff00;
      border-radius: 10px;
      font-size: 1.25em;
      box-shadow: 0 0 15px #ffff00;
    }

    @keyframes glow {
      from { text-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff; }
      to { text-shadow: 0 0 40px #ff00ff, 0 0 70px #00ffff, 0 0 90px #ffff00; }
    }

    footer {
      margin-top: 80px;
      color: #666;
      font-size: 0.9em;
    }
    @media (max-width: 768px) {

  body {
    overflow-x: hidden;
  }

  h1 {
    font-size: 1.6em !important;
  }

  .subtitle {
    font-size: 0.8em !important;
  }

  .games-grid {
    grid-template-columns: 1fr !important;
    gap: 15px;
  }

  .game-card {
    padding: 20px 15px;
  }

  button {
    width: 100%;
    font-size: 0.9em;
  }

  .balance {
    position: static;
    margin: 10px auto;
    width: fit-content;
  }
}
  </style>
</head>
<body>

  <div class="balance" id="balance">Balance: ₦1,000,000</div>

  <div class="container">
    <h1>CASINO ROYALE</h1>
    <p class="subtitle">ANILORD • NIGERIA • 2026</p>

    <div class="games-grid">
      
      <!-- Slots -->
      <div class="game-card">
        <div class="emoji">🎰</div>
        <h2>SLOTS</h2>
        <p>Spin for the Jackpot!</p>
        <button onclick="window.location.href='slot.html'">PLAY SLOTS</button>
      </div>

      <!-- Roulette -->
      <div class="game-card">
        <div class="emoji">🎡</div>
        <h2>ROULETTE</h2>
        <p>Red or Black?</p>
        <button onclick="window.location.href='roulette.html'">PLAY ROULETTE</button>
      </div>

      <!-- Dice -->
      <div class="game-card">
        <div class="emoji">🎲</div>
        <h2>HIGH / LOW DICE</h2>
        <p>1-18 or 19-36?</p>
        <button onclick="window.location.href='dice.html'">PLAY DICE</button>
      </div>

      <!-- Transactions -->
      <div class="game-card">
        <div class="emoji">💰</div>
        <h2>ACTIVITY</h2>
        <p>Bet History & Wallet</p>
        <button onclick="window.location.href='tran.html'">VIEW HISTORY</button>
      </div>

      <!-- Settings -->
      <div class="game-card">
        <div class="emoji">⚙️</div>
        <h2>SETTINGS</h2>
        <p>Sound • Support • Reset</p>
        <button onclick="window.location.href='setting.html'">OPEN SETTINGS</button>
      </div>

    </div>

    <footer>
      Gamble Responsibly • Have Fun • ANILORD Inc.
    </footer>
  </div>

  <script>
    let money = 1000000;

    function updateBalance() {
      document.getElementById("balance").innerText = `Balance: ₦${money.toLocaleString()}`;
    }

    // Load balance from localStorage
    if (localStorage.getItem("casinoMoney")) {
      money = parseInt(localStorage.getItem("casinoMoney"));
    }
    updateBalance();

    // Listen for balance changes from other pages
    window.addEventListener("storage", () => {
      if (localStorage.getItem("casinoMoney")) {
        money = parseInt(localStorage.getItem("casinoMoney"));
        updateBalance();
      }
    });
  </script>
</body>
</html>
